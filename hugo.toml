baseURL = 'https://klifehack.com/'
languageCode = 'ja-jp'
title = 'K-Life Hack Japan'
theme = 'hugo-theme-stack'
publishDir = 'docs'

[params]
    mainSections = ["posts"]
    featuredImageField = "image"
    favicon = "/img/favicon.ico"

    # [교정 1] dateFormat을 객체 구조로 변경 (빌드 에러 해결)
    [params.dateFormat]
        published = "2006/01/02"
        lastUpdated = "2006/01/02"

    [params.sidebar]
        avatar = "/img/logo.jpg"
        # 일본어 타겟팅 3줄 요약 소개
        subtitle = "韓国・パンギョの現役テクニカルアーティスト「K」による技術的キュレーション。韓国の最新ITトレンド、ディープな旅行ハック、そしてリアルな生活情報をお届けします。"

    # [교정 2] 위젯 설정을 객체 배열 구조로 변경 (interface{} 에러 해결)
    [[params.widgets]]
        type = "search"
    [[params.widgets]]
        type = "archives"
    [[params.widgets]]
        type = "categories"

    [params.article]
        math = false
        toc = true
        readingTime = true

# [좌측 메뉴바 구성]
[menu]
    [[menu.main]]
        identifier = "home"
        name = "Home"
        url = "/"
        weight = 10
        [menu.main.params]
            icon = "home"

    [[menu.main]]
        identifier = "categories"
        name = "Categories"
        url = "/categories/"
        weight = 20
        [menu.main.params]
            # folder.svg 에러 방지를 위해 존재하는 archive 아이콘으로 대체
            icon = "archive" 

    [[menu.main]]
        identifier = "about"
        name = "About"
        url = "/about/" 
        weight = 30
        [menu.main.params]
            icon = "user"

    [[menu.main]]
        identifier = "telegram"
        name = "Telegram"
        url = "https://t.me/korinside"
        weight = 40
        [menu.main.params]
            icon = "messages"

[outputs]
    home = ["HTML", "RSS", "JSON"]