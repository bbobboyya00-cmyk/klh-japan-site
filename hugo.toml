baseURL = 'https://klifehack.com/'
title = 'K-Life Hack'
theme = 'hugo-theme-stack'
publishDir = 'docs'
languageCode = 'ja'             # 👈 'en-us'에서 변경
defaultContentLanguage = 'ja'   # 👈 'en'에서 변경

#disqusShortname = "klifehack-com"


[related]
    threshold = 80
    includeNewer = false
    toLower = true

    [[related.indices]]
        name = "categories"
        weight = 100  # 카테고리가 같으면 최우선 순위

    [[related.indices]]
        name = "tags"
        weight = 80   # 태그 일치 여부

    [[related.indices]]
        name = "date"
        weight = 10   # 최신순 가중치
		
# [2. 분류 체계 정의]
[taxonomies]
    category = "categories"
    tag = "tags"

# [3. URL 구조]
[Permalinks]
    posts = "/p/:slug/"

[params]
    mainSections = ["posts"]
    featuredImageField = "image"
    favicon = "favicon.ico"

    [params.dateFormat]
        published = "2006/01/02"
        lastUpdated = "2006/01/02"

    [params.sidebar]
        avatar = "img/logo.jpg" 
        name = "K-Life Hack"
        subtitle = "ITアーキテクトから編集長へ。クリエイティブ・ディレクター「K」が贈る、技術的洞察と洗練された韓国ライフスタイル・キュレーション。"

    [params.widgets]
        homepage = [
            { type = "search" },
            { type = "archives" },
            { type = "categories" },
            { type = "tag-cloud" }    # 👈 C를 대문자로 변경 (에러 해결)
        ]
        page = [
			{ type = "search" },   # 👈 이거 추가 (핵심)
			{ type = "toc" }
		]
		
    [params.article]
        math = false
        toc = true
        readingTime = true
		related = true
		
    [params.comments]
        enabled = false
        type = "disqus"

[menu]
    [[menu.main]]
        identifier = "home"
        name = "ホーム"         # 👈 Home -> ホーム
        url = "/"
        weight = 10
        [menu.main.params]
            icon = "home"

    [[menu.main]]
        identifier = "archives"
        name = "アーカイブ"      # 👈 Archives -> アーカイブ
        url = "/archives/"
        weight = 20
        [menu.main.params]
            icon = "archive"

    [[menu.main]]
        identifier = "about"
        name = "紹介"           # 👈 About -> 紹介 (또는 プロフィール)
        url = "/about/" 
        weight = 30
        [menu.main.params]
            icon = "user"

    [[menu.main]]
        identifier = "telegram"
        name = "テレグラム"      # 👈 Telegram -> テレグラム
        url = "https://t.me/korinside"
        weight = 40
        [menu.main.params]
            icon = "mail"
			


[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    endLevel = 4
    startLevel = 2

[params.analytics]
    enable = true
    [params.analytics.google]
        id = "G-4KGC4HJF0E" 

[outputs]
    home = ["HTML", "RSS", "JSON"]
    page = ["HTML"]

[params.search]
    enable = true
    type = "fuse"
    content = true