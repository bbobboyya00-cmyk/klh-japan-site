[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    endLevel = 4
    startLevel = 2

[services]
  [services.googleAnalytics]
    ID = 'G-4KGC4HJF0E'

[sitemap]
    changefreq = "daily"
    priority = 0.5
    filename = "sitemap.xml"
	
[outputs]
    home = ["html", "rss", "json", "sitemap"]
    page = ["html"]

[params.search]
    enable = true
    type = "fuse"
    content = true
	
[security]
  enableInlineShortcodes = false
  [security.http]
    methods = ['(?i)GET|POST']
    urls = ['.*'] # 모든 외부 URL 자원 접근 허용 (또는 '^https://cdn\\.jsdelivr\\.net/.*')