defaultContentLanguage = "ja"
hasCJKLanguage = true
baseURL = 'https://klifehack.com/'
languageCode = 'ja'
title = 'K-Life Hack'
theme = 'hugo-theme-stack'
publishDir = 'docs'

# [1. 댓글 설정]
disqusShortname = "klifehack-com"


[related]
    threshold = 80
    includeNewer = false
    toLower = true

    [[related.indices]]
        name = "categories"
        weight = 100  # 카테고리가 같으면 최우선 순위

    [[related.indices]]
        name = "tags"
        weight = 80   # 태그 일치 여부

    [[related.indices]]
        name = "date"
        weight = 10   # 최신순 가중치
		
# [2. 분류 체계 정의]
[taxonomies]
    category = "categories"
    tag = "tags"

# [3. URL 구조]
[Permalinks]
    posts = "/p/:slug/"

[params]
    mainSections = ["posts"]
    featuredImageField = "image"
    favicon = "favicon.ico"

    [params.dateFormat]
        published = "2006/01/02"
        lastUpdated = "2006/01/02"

    [params.sidebar]
        avatar = "img/logo.jpg" 
        name = "K-Life Hack"
        subtitle = "ITアーキテクトから編集長へ。クリエイティブ・ディレクター「K」が贈る、技術的洞察と洗練された韓国ライフスタイル・キュレーション。"

    [params.widgets]
        homepage = [
            { type = "search" },
            { type = "archives" },
            { type = "categories" },
            { type = "tag-cloud" }    # 👈 C를 대문자로 변경 (에러 해결)
        ]
        page = [
            { type = "toc" }
        ]
		
    [params.article]
        math = false
        toc = true
        readingTime = true
		related = true
		
    [params.comments]
        enabled = true
        type = "disqus"

[menu]
    [[menu.main]]
        identifier = "home"
        name = "Home"
        url = "/"
        weight = 10
        [menu.main.params]
            icon = "home"

    [[menu.main]]
		identifier = "archives"   # 👈 identifier 변경
		name = "Archives"        # 👈 표시 이름을 Archives로 변경
		url = "/archives/"       # 👈 url을 /archives/로 변경
		weight = 20
		[menu.main.params]
			icon = "archive"     # 👈 아이콘도 아카이브용으로 변경

    [[menu.main]]
        identifier = "about"
        name = "About"
        url = "/about/" 
        weight = 30
        [menu.main.params]
            icon = "user"

    [[menu.main]]
        identifier = "telegram"
        name = "Telegram"
        url = "https://t.me/korinside"
        weight = 40
        [menu.main.params]
            icon = "mail"
			

[outputs]
    home = ["HTML", "RSS", "JSON"]
    page = ["HTML"]
    section = ["HTML", "RSS"]
    taxonomy = ["HTML", "RSS"]
    term = ["HTML", "RSS"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    endLevel = 4
    startLevel = 2

[params.analytics]
    enable = true
    [params.analytics.google]
        id = "G-92N7W10SPC" 