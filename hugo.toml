baseURL = 'https://klifehack.com/'
title = 'K-Life Hack | 韓国ハイエンド・ライフスタイルガイド'
theme = 'hugo-theme-stack'
publishDir = 'docs'
#languageCode = 'ja'             # 👈 'en-us'에서 변경
defaultContentLanguage = 'ja'   # 👈 'en'에서 변경
defaultContentLanguageInSubdir = false # 🎯 [v2606.044 TA] 일어 트랙의 루트(/p/) 경로 무결성 사수 및 영어만 /en/ 배치
hasCJKLanguage = true

#disqusShortname = "klifehack-com"


[related]
    threshold = 80
    includeNewer = false
    toLower = true

    [[related.indices]]
        name = "categories"
        weight = 100  # 카테고리가 같으면 최우선 순위

    [[related.indices]]
        name = "tags"
        weight = 80   # 태그 일치 여부

    [[related.indices]]
        name = "date"
        weight = 10   # 최신순 가중치
		
# [2. 분류 체계 정의]
[taxonomies]
    category = "categories"
    tag = "tags"

# [3. URL 구조]
[permalinks]
    posts = "/p/:slug/"

[params]
    enableRobotsTXT = true    # 👈 [핵심] 자동으로 완전한 robots.txt를 생성하여 색인 속도 향상
    mainSections = ["posts"]
    featuredImageField = "image"
    favicon = "favicon.ico"
	
    [params.dateFormat]
        published = "2006/01/02"
        lastUpdated = "2006/01/02"

    [params.widgets]
        homepage = [
            { type = "search" },
            { type = "archives" },
            { type = "categories" },
            { type = "tag-cloud" }    # 👈 C를 대문자로 변경 (에러 해결)
        ]
        page = [
			{ type = "search" },   # 👈 이거 추가 (핵심)
			{ type = "toc" }
		]
		
    [params.article]
        math = false
        toc = true
        readingTime = true
		related = true
		
    [params.comments]
        enabled = true
        type = "disqus"

# =============================================================================
# [4. 다국어 아키텍처 및 로컬라이징 제어 벨트 - v2606.150 TA]
# =============================================================================
[languages]
  # ---------------------------------------------------------------------------
  # 일본어 독립 매거진 섹션 (Hugo 최신 표준 동기화 완벽 보존)
  # ---------------------------------------------------------------------------
  [languages.ja]
    locale = 'ja'              # 👈 구형 languageCode 대치 (v0.158.0+ 표준 명세)
    label = '日本語'            # 👈 구형 languageName 대치 (v0.158.0+ 표준 명세)
    weight = 1
    title = 'K-Life Hack | システムアーキテクチャ & DevOps'
    
    [languages.ja.params]
        [languages.ja.params.sidebar]
            avatar = "img/persona_k_ambient.webp" 
            name = "K-Life Hack"
            subtitle = "ソウル在住のITアーキテクト「K」が綴る、データで読み解く最新の韓国トレンドと洗練された日常。"

  # ---------------------------------------------------------------------------
  # 영어 독립 매거진 섹션 (글로벌 멸균 트랙 최신 동기화 구축)
  # ---------------------------------------------------------------------------
  [languages.en]
    locale = 'en'              # 👈 구형 languageCode 대치 (v0.158.0+ 표준 명세)
    label = 'English'          # 👈 구형 languageName 대치 (v0.158.0+ 표준 명세)
    weight = 2
    title = 'K-Life Hack | Systems Architecture & DevOps'
    
    [languages.en.params]
        [languages.en.params.sidebar]
            avatar = "img/persona_k_ambient.webp" 
            name = "K-Life Hack (Global)"
            subtitle = "Latest Korean trends and refined daily life decoded with data by Seoul-based IT Architect 'K'."
