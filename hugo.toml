baseURL = 'https://klifehack.com/'
languageCode = 'ja-jp'
title = 'K-Life Hack Japan'
theme = 'hugo-theme-stack'
publishDir = 'docs'

# [추가] 분류 체계 정의 (Taxonomy Error 해결)
[taxonomies]
    category = "categories"
    tag = "tags"

[params]
    mainSections = ["posts"]
    featuredImageField = "image"
    favicon = "/img/favicon.ico"

    [params.dateFormat]
        published = "2006/01/02"
        lastUpdated = "2006/01/02"

    [params.sidebar]
        avatar = "img/logo.jpg" 
		name = "K-Life Hack"
        subtitle = "韓国・パンギョの現役テクニカルアーティスト「K」による技術的キュレーション。最新ITトレンド、旅行ハック、生活情報を届けます。"

    [params.widgets]
        homepage = [
            { type = "search" },
            { type = "archives" },
            { type = "categories" }
        ]
        page = [
            { type = "search" },
            { type = "archives" },
            { type = "categories" }
        ]

    [params.article]
        math = false
        toc = true
        readingTime = true

[menu]
    [[menu.main]]
        identifier = "home"
        name = "Home"
        url = "/"
        weight = 10
        [menu.main.params]
            icon = "home"

    [[menu.main]]
        identifier = "categories"
        name = "Categories"
        url = "/categories/"
        weight = 20
        [menu.main.params]
            icon = "archive" 

    [[menu.main]]
        identifier = "about"
        name = "About"
        url = "/about/" 
        weight = 30
        [menu.main.params]
            icon = "user"

    [[menu.main]]
        identifier = "telegram"
        name = "Telegram"
        url = "https://t.me/korinside"
        weight = 40
        [menu.main.params]
            icon = "mail"

# [수정] 검색을 위한 출력 규격 최적화
[outputs]
    home = ["HTML", "RSS", "JSON"]