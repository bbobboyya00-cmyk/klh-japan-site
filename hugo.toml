baseURL = 'https://klifehack.com/'
languageCode = 'ja-jp'
title = 'K-Life Hack'
theme = 'hugo-theme-stack'
publishDir = 'docs'

# [1. 댓글 설정]
disqusShortname = "klifehack-com"

# [2. 분류 체계 정의]
[taxonomies]
    category = "categories"
    tag = "tags"

# [3. URL 구조: 데모와 동일하게 /p/ 스팀 설정]
[Permalinks]
    posts = "/p/:slug/"

[params]
    mainSections = ["posts"]
    featuredImageField = "image"
    favicon = "/img/favicon.ico"

    [params.dateFormat]
        published = "2006/01/02"
        lastUpdated = "2006/01/02"

    # [4. 사이드바: 순수 일본어로 정제]
    [params.sidebar]
        avatar = "img/logo.jpg" 
        name = "K-Life Hack"
        # 일본어 정제: 한국 팡교의 현역 TA 'K'가 전하는 기술 큐레이션 및 생활 정보
        subtitle = "韓国・パンギョの現役テクニカルアーティスト「K」による技術的キュレーション。最新ITトレンドからディープな旅行ハック、リアルな生活情報までお届けします。"

    # [5. 우측 위젯: 데모 레이아웃 반영]
    [params.widgets]
        homepage = [
            { type = "search" },
            { type = "archives" },
            { type = "categories" }
        ]
        page = [
            { type = "toc" }
        ]

    [params.article]
        math = false
        toc = true
        readingTime = true

    [params.comments]
        enabled = true
        type = "disqus"

# [6. 메뉴 구성: 아이콘 의존성 해결]
[menu]
    [[menu.main]]
        identifier = "home"
        name = "Home"
        url = "/"
        weight = 10
        [menu.main.params]
            icon = "home"

    [[menu.main]]
        identifier = "categories"
        name = "Categories"
        url = "/categories/"
        weight = 20
        [menu.main.params]
            icon = "archive" 

    [[menu.main]]
        identifier = "about"
        name = "About"
        url = "/about/" 
        weight = 30
        [menu.main.params]
            icon = "user"

    [[menu.main]]
        identifier = "telegram"
        name = "Telegram"
        url = "https://t.me/korinside"
        weight = 40
        [menu.main.params]
            icon = "mail"

[outputs]
    home = ["HTML", "RSS", "JSON"]
	
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true