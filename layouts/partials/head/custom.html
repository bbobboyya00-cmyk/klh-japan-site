{{ if .IsPage }}
<div id="reading-progress-bar"></div>

<style>
    #reading-progress-bar {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        width: 0%;
        height: 5px !important; /* 가시성 확보를 위해 1px 늘림 */
        
        /* [핵심 교정]: 변수 의존도를 낮추고 확실한 색상을 강제 주입 */
        /* 테마 컬러가 안 잡힐 때를 대비해 K-Life Hack의 포인트 블루(#3b82f6) 강제 적용 */
        background-color: #3b82f6 !important; 
        background: linear-gradient(to right, #3b82f6, #60a5fa) !important;
        
        /* 그림자 효과로 흰 배경에서도 경계선 명확히 구분 */
        box-shadow: 0 1px 10px rgba(59, 130, 246, 0.5) !important;
        
        /* [중요]: 어떤 UI 요소보다 위에 오도록 z-index 극대화 */
        z-index: 999999 !important; 
        
        transition: width 0.1s ease-out;
        pointer-events: none;
    }
</style>

<script>
    (function() {
        const bar = document.getElementById("reading-progress-bar");
        if (!bar) return;

        const updateBar = () => {
            const winScroll = window.pageYOffset || document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            if (height > 0) {
                const scrolled = (winScroll / height) * 100;
                bar.style.width = scrolled + "%";
            }
        };

        // 스크롤 및 리사이즈 시 대응
        window.addEventListener('scroll', updateBar, { passive: true });
        window.addEventListener('resize', updateBar);
        
        // 초기 로드 시 0% 상태 방지
        updateBar();
    })();
</script>
{{ end }}
