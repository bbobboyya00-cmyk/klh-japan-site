{{/* [v2504.27 TA] 404 페이지 빌드 에러 대응: .Kind 속성 사용 */}}
{{ if or (eq .Kind "taxonomy") (eq .Kind "term") }}
  <meta name="robots" content="noindex, follow">
{{ end }}

{{ if .Site.Params.analytics.enabled }}
<script async src="https://www.googletagmanager.com/gtag/js?id={{ .Site.Params.analytics.google.id }}"></script>
<script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', '{{ .Site.Params.analytics.google.id }}');
</script>
{{ end }}

{{ if .IsPage }}
<div id="reading-progress-bar"></div>

<style>
    #reading-progress-bar {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        width: 0%;
        height: 4px !important;
        background: linear-gradient(to right, #3b82f6, #60a5fa) !important;
        box-shadow: 0 1px 8px rgba(59, 130, 246, 0.4) !important;
        z-index: 2147483647 !important; 
        transition: width 0.1s ease-out;
        pointer-events: none;
        margin-top: env(safe-area-inset-top, 0);
    }
</style>

<script>
    (function() {
        const bar = document.getElementById("reading-progress-bar");
        if (!bar) return;

        const updateProgress = () => {
            const winScroll = window.pageYOffset || document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - window.innerHeight;
            if (height > 0) {
                const scrolled = (winScroll / height) * 100;
                bar.style.width = Math.min(scrolled, 100) + "%";
            }
        };

        window.addEventListener('scroll', updateProgress, { passive: true });
        window.addEventListener('resize', updateProgress);
        updateProgress();
    })();
</script>
{{ end }}

<link rel="icon" href="/favicon.ico" type="image/x-icon">
<link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
