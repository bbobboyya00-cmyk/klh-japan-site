{{ define "main" }}
<main class="main full-width">
    <form action="{{ .RelPermalink }}" class="search-form" data-json="{{ "search/index.json" | relURL }}">
        <p>
            <label>Search</label>
            <input name="keyword" placeholder="Type something..." />
        </p>
        <button title="Search">
            <svg xmlns="http://www.w3.org/2000/svg" class="icon icon-tabler icon-tabler-search" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z"></path><circle cx="10" cy="10" r="7"></circle><line x1="21" y1="21" x2="15" y2="15"></line></svg>
        </button>
    </form>

    <div class="search-result">
        <h3 class="search-result--title section-title"></h3>
        <div class="search-result--list article-list--compact"></div>
    </div>
</main>

{{/* 테마의 검색 엔진 스크립트를 수동으로 로드합니다 */}}
{{ $js := resources.Get "ts/search.js" | default (resources.Get "ts/search.tsx") }}
{{ if $js }}
    {{ $builtJs := $js | js.Build (dict "minify" true "target" "es2015") }}
    <script src="{{ $builtJs.RelPermalink }}" defer></script>
{{ else }}
    <script type="text/javascript" src="/ts/search.js" defer></script>
{{ end }}
{{ end }}
